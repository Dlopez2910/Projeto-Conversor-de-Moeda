<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Conversor de Moeda</title>
</head>

<body>
    <img class="logo" src="./img/logo.gif" alt="Logo">


    <main>
        <label>
            Converter <b>de</b>
            <select>
                <option>R$ Real Brasileiro</option>
            </select>
        </label>

        <label>
            Converter <b>para</b>
            <select class="currency-select">
                <option  value="USD">US$ Dólar Americano</option>
                <option  value="EUR">€ Euro</option>
                <option value="BTC">(₿) Bitcoin</option>
            </select>
        </label>

        <label>
            Valor
            <input class="input-currency" placeholder="Digite o valor">
        </label>

        <button class="convert-button">Converter</button>


        <section>

            <div class="currency-box">
                <img src="./img/brasil 2.png" alt=" moeda-a-ser-convertida">
                <p class="currency">Real Brasileiro</p>
                <p class="currency-value-real">R$0,00</p>
            </div>

            <img class="arrow" src="./img/Vector.png" alt=" para-qual-moeda-converter">

            <div class="currency-box">
                <img src="./img/estados-unidos (1) 1.png" alt=" moeda-convertida">
                <p class="currency">US$ Dólar Americano</p>
                <p class="currency-value-converted">US$0,00</p>
            </div>
        </section>
    </main>


</body>

</html>
